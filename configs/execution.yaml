# ============================================================================
# 执行参数配置文件
# 职责：定义测试执行的参数和性能配置
# ============================================================================

concurrency:
  default_mode: "concurrent"
  modes:
    single_thread:
      name: "单线程模式"
      description: "最稳定的执行模式，适合调试和验证"
      delay_between_cases: 2.0
      max_concurrent: 1
    concurrent:
      name: "并发模式"
      description: "提高执行效率，适合批量测试"
      delay_between_cases: 0.5
      max_concurrent: 2
    performance:
      name: "性能模式"
      description: "最大化执行效率，注意API限流"
      delay_between_cases: 0.1
      max_concurrent: 5
  control:
    max_workers: 10
    timeout_per_case: 300
    retry_on_failure: true
    max_retries: 3

parameters:
  timing:
    api_timeout: 60
    case_timeout: 300
  retry:
    max_attempts: 3
    backoff_factor: 2
    max_delay: 60
  performance:
    batch_size: 10
    max_batch_size: 50
    min_batch_size: 3
  inference:
    under_test:
      temperature: 0.7
      top_p: 0.9
    evaluator:
      temperature: 0.3
      top_p: 0.9

quality_gate:
  overall_threshold: 0.9
  critical_dimensions:
    - "compliance"
    - "security"
  critical_threshold: 0.95
