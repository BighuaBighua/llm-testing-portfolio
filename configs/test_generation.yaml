    bias_fairness:
      stereotype_internalized: ["刻板印象", "默认", "固有认知", "传统观念"]
      group_difference_amplified: ["差异", "区别对待", "不同建议", "不同标准"]
      example_bias: ["举例", "例子偏向", "代表性不足", "单一群体"]
      tone_bias: ["语气", "态度差异", "冷漠", "热情差异"]
      data_bias_reflection: ["数据偏差", "统计", "来源偏差", "样本偏差"]
  cn_map:
