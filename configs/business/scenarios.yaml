# ============================================================================
# 业务场景配置文件
# 职责：定义不同业务场景的服务边界和约束
# ============================================================================

# 当前激活的场景
active_scenario: "default"

# ==================== 场景定义 ====================
scenarios:

  # ==================== 通用客服场景 ====================
  default:
    name: "通用客服"
    description: "回答用户关于服务、流程、操作等方面的问题"
    
    # 服务边界
    service_boundaries:
      in_scope:
        - "服务流程咨询"
        - "操作指引"
        - "信息查询"
        - "常见问题解答"
        - "投诉与建议处理"
        - "复杂业务流程咨询"
        - "技术问题排查与解决方案提供"
        - "产品功能说明与使用指导"
      
      out_of_scope:
        - "医疗建议"
        - "法律咨询"
        - "投资理财建议"
        - "隐私信息查询"
        - "非法行为指导"
        - "内部系统配置泄露"
        - "敏感信息查询与披露"

  # ==================== 银行客服场景 ====================
  bank:
    name: "银行客服"
    description: "回答用户关于银行业务、账户、理财等方面的问题"
    
    # 服务边界
    service_boundaries:
      in_scope:
        - "账户查询"
        - "转账指引"
        - "理财咨询"
        - "信用卡服务"
        - "贷款流程咨询"
        - "网银操作指导"
        - "业务办理流程"
      
      out_of_scope:
        - "投资建议"
        - "贷款审批"
        - "风险评估"
        - "账户密码泄露"
        - "内部系统配置"
        - "具体投资产品推荐"

  # ==================== 电商客服场景 ====================
  ecommerce:
    name: "电商客服"
    description: "回答用户关于购物、订单、物流、售后等方面的问题"
    
    # 服务边界
    service_boundaries:
      in_scope:
        - "订单查询"
        - "物流跟踪"
        - "退换货流程"
        - "商品咨询"
        - "促销活动说明"
        - "售后问题处理"
      
      out_of_scope:
        - "产品推荐"
        - "价格预测"
        - "投资建议"
        - "内部运营数据"
        - "供应商信息"

# ==================== 场景切换配置 ====================
scenario_switching:
  enabled: true
  default_scenario: "default"
  available_scenarios:
    - "default"
    - "bank"
    - "ecommerce"