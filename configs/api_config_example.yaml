# ============================================================================
# API 配置中心 - 示例文件 (Template)
# 职责：API 配置模板，包含所有配置项的占位符
# 注意：此文件仅作为模板，请复制并重命名为 api_config.yaml 后使用
# ============================================================================

# ----------------------------------------------------------------------------
# 🚨 重要使用说明
# ----------------------------------------------------------------------------
# 使用步骤：
# 1. 复制此文件：cp api_config_example.yaml api_config.yaml
# 2. 编辑实际文件：在 api_config.yaml 中填写你的真实 API 密钥
# 3. 安全保护：api_config.yaml 已在 .gitignore 中，不会被提交到版本控制
# 4. 自动加载：系统会优先加载 api_config.yaml，如果不存在则使用此模板

# ----------------------------------------------------------------------------
# 📝 配置项说明
# ----------------------------------------------------------------------------
# - 所有配置项都使用占位符格式：YOUR_XXX_HERE
# - 请根据你的实际情况替换为真实的 API 密钥
# - 不需要的 API 服务可以保留占位符或删除对应配置节

# ----------------------------------------------------------------------------
# 🔑 百度千帆 API（必填 - 被测模型）
# ----------------------------------------------------------------------------
# 获取方式: https://console.bce.baidu.com/qianfan/
# 状态: 🔴 必填 - 主要测试对象
qianfan:
  name: "百度千帆"
  ak: "YOUR_QIANFAN_ACCESS_KEY_HERE"        # 🔴 请替换为你的 Access Key
  sk: "YOUR_QIANFAN_SECRET_KEY_HERE"        # 🔴 请替换为你的 Secret Key
  base_url: "https://aip.baidubce.com"
  model: "ernie-4.5-turbo-128k"
  description: "主要测试对象，用于生成 AI 客服回复"

# ----------------------------------------------------------------------------
# 🔑 阿里云 DashScope API（推荐 - 评测模型主力）
# ----------------------------------------------------------------------------
# 获取方式: https://dashscope.console.aliyun.com/
# 免费额度: 请查看阿里云官方文档获取最新额度信息
# 状态: 🟡 推荐 - 主要评测模型
dashscope:
  name: "阿里云DashScope"
  api_key: "YOUR_DASHSCOPE_API_KEY_HERE"     # 🟡 请替换为你的 API Key
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen-turbo"
  description: "主要评测模型，用于评估 AI 客服回复质量"

# ----------------------------------------------------------------------------
# 🔑 魔搭社区 ModelScope API（可选 - 评测模型后备1）
# ----------------------------------------------------------------------------
# 获取方式: https://modelscope.cn/
# 状态: 🟢 可选 - 备用评测模型
modelscope:
  name: "魔搭社区"
  api_key: "YOUR_MODELSCOPE_API_KEY_HERE"    # 🟢 可选 - 备用评测模型
  base_url: "https://api-inference.modelscope.cn/v1/"
  model: "Qwen/Qwen3.5-35B-A3B"
  description: "备用评测模型，用于对比验证"

# ----------------------------------------------------------------------------
# 📋 配置版本信息
# ----------------------------------------------------------------------------
config_info:
  version: "1.0"
  created_date: "2026-04-10"
  last_updated: "2026-04-10"
  migration_from: ".env（已废弃）"
  description: "API 配置中心化迁移，统一管理所有 API 密钥（示例模板）"
  file_type: "示例文件 (Template)"
  usage: "请复制为 api_config.yaml 后使用"
