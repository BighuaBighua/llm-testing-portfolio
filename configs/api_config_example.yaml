# ============================================================================
# API 配置中心 - 示例文件 (Template)
# 职责：API 配置模板，包含所有配置项的占位符
# 注意：此文件仅作为模板，请复制并重命名为 api_config.yaml 后使用
# ============================================================================

# ----------------------------------------------------------------------------
# 使用说明
# ----------------------------------------------------------------------------
# 1. 复制此文件：cp api_config_example.yaml api_config.yaml
# 2. 编辑实际文件：在 api_config.yaml 中填写你的真实 API 密钥
# 3. 安全保护：api_config.yaml 已在 .gitignore 中，不会被提交到版本控制
# 4. 自动加载：系统会优先加载 api_config.yaml，如果不存在则使用此模板
#
# 三个模型完全独立配置，换模型只需改对应配置块
# - case_generator: 生成测试用例的模型
# - model_under_test: 被测模型（AI客服）
# - evaluator: 评测模型（评判回答质量）

# ----------------------------------------------------------------------------
# 生成用例模型（用于生成测试用例）
# ----------------------------------------------------------------------------
case_generator:
  name: "百度千帆"
  model: "ernie-4.5-turbo-128k"
  base_url: "https://qianfan.baidubce.com/v2/chat/completions"
  ak: "YOUR_QIANFAN_ACCESS_KEY_HERE"
  sk: "YOUR_QIANFAN_SECRET_KEY_HERE"
  # 备用模型配置（主模型限流或调用失败时自动切换）
  fallback:
    enable: true   # true=启用备用模型（主模型失败时自动切换），false=禁用备用模型（仅使用主模型）
    providers:
      - name: "阿里云DashScope"
        model: "qwen-turbo"
        base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
        api_key: "YOUR_DASHSCOPE_API_KEY_HERE"

# ----------------------------------------------------------------------------
# 被测模型（AI客服，被评测的对象）
# 注意：被测模型不支持备用，因为评测目标就是该模型本身
# ----------------------------------------------------------------------------
model_under_test:
  name: "百度千帆"
  model: "ernie-4.5-turbo-128k"
  base_url: "https://qianfan.baidubce.com/v2/chat/completions"
  ak: "YOUR_QIANFAN_ACCESS_KEY_HERE"
  sk: "YOUR_QIANFAN_SECRET_KEY_HERE"

# ----------------------------------------------------------------------------
# 评测模型（评判回答质量的模型）
# ----------------------------------------------------------------------------
evaluator:
  name: "阿里云DashScope"
  model: "qwen-turbo"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: "YOUR_DASHSCOPE_API_KEY_HERE"
  # 备用模型配置（主模型限流或调用失败时自动切换）
  fallback:
    enable: true   # true=启用备用模型（主模型失败时自动切换），false=禁用备用模型（仅使用主模型）
    providers:
      - name: "魔搭社区"
        model: "Qwen/Qwen3.5-35B-A3B"
        base_url: "https://api-inference.modelscope.cn/v1/"
        api_key: "YOUR_MODELSCOPE_API_KEY_HERE"
      - name: "百度千帆"
        model: "ernie-4.5-turbo-128k"
        base_url: "https://qianfan.baidubce.com/v2/chat/completions"
        ak: "YOUR_QIANFAN_ACCESS_KEY_HERE"
        sk: "YOUR_QIANFAN_SECRET_KEY_HERE"

# ----------------------------------------------------------------------------
# 配置版本信息
# ----------------------------------------------------------------------------
config_info:
  version: "2.0"
  created_date: "2026-04-10"
  last_updated: "2026-04-15"
  description: "三模型独立配置示例模板"
  file_type: "示例文件 (Template)"
  usage: "请复制为 api_config.yaml 后使用"
